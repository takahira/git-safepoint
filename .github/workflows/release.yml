name: Publish to PyPI

# Build the sdist + wheel and publish to PyPI via OIDC Trusted Publishing -- no
# API token or password is stored anywhere. Runs when a GitHub Release is
# published (create a release on a `vX.Y.Z` tag to ship that version).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    # Only the public repo has the PyPI Trusted Publisher configured; skip on the
    # private mirror so a stray release there cannot fail the publish step.
    if: github.repository == 'takahira/git-safepoint'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-safepoint
    permissions:
      id-token: write  # mint the OIDC token PyPI Trusted Publishing verifies
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
