name: Publish to PyPI

# Build the sdist + wheel and publish to PyPI via OIDC Trusted Publishing -- no
# API token or password is stored anywhere. Runs when a GitHub Release is
# published (create a release on a `vX.Y.Z` tag to ship that version).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    # Only the public repo has the PyPI Trusted Publisher configured; skip on the
    # private mirror so a stray release there cannot fail the publish step.
    if: github.repository == 'takahira/git-safepoint'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-safepoint
    permissions:
      id-token: write  # mint the OIDC token PyPI Trusted Publishing verifies
    steps:
      # Every action here is pinned to a commit SHA: this workflow holds
      # id-token:write (PyPI Trusted Publishing), so a hijacked action tag/ref
      # could publish a malicious package under our trusted-publisher identity.
      # ci.yml pins checkout/setup-python to the same SHAs -- bump both together.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing, no token)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
